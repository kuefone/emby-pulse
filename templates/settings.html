{% extends "layout.html" %}

{% block content %}
<div class="w-full max-w-[1600px] mx-auto px-4 md:px-6 py-6 pb-20">
    
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-black text-gray-900 dark:text-white tracking-tight flex items-center gap-2">
                <i class="fa-solid fa-sliders text-indigo-500"></i>系统设置
            </h1>
            <p class="text-xs font-medium text-gray-500 dark:text-gray-400 mt-1">全局参数、API 密钥与自动化规则配置</p>
        </div>
        <button onclick="saveSettings()" id="top-save-btn" class="w-full sm:w-auto flex items-center justify-center gap-2 px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold text-sm shadow-sm transition-all active:scale-95">
            <i class="fa-solid fa-floppy-disk"></i>
            <span id="save-btn-text">保存配置</span>
        </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-3 gap-5 items-stretch">
        
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/80 flex flex-col">
            <div class="px-5 py-3.5 border-b border-gray-100 dark:border-gray-700/50 flex items-center gap-2.5 bg-gray-50/50 dark:bg-gray-800/30 rounded-t-xl">
                <i class="fa-solid fa-server text-indigo-500 text-base"></i>
                <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm">Emby 核心连接</h3>
            </div>
            <div class="p-5 flex-1 flex flex-col space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">内网通信地址</label>
                    <input type="text" id="emby_host" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all placeholder-gray-400" placeholder="http://172.17.0.1:8096">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">系统 API Key</label>
                    <div class="relative">
                        <input type="password" id="emby_api_key" class="w-full pl-3 pr-10 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all">
                        <button type="button" onclick="toggleShow('emby_api_key')" class="absolute right-1 top-1/2 -translate-y-1/2 w-8 h-8 text-gray-400 hover:text-indigo-500 transition-colors">
                            <i id="icon-emby_api_key" class="fa-solid fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/80 flex flex-col">
            <div class="px-5 py-3.5 border-b border-gray-100 dark:border-gray-700/50 flex items-center gap-2.5 bg-gray-50/50 dark:bg-gray-800/30 rounded-t-xl">
                <i class="fa-solid fa-globe text-emerald-500 text-base"></i>
                <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm">对外服务门户</h3>
            </div>
            <div class="p-5 flex-1 flex flex-col space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">公网访问入口</label>
                    <input type="text" id="emby_public_url" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-emerald-500/50 outline-none transition-all placeholder-gray-400" placeholder="https://emby.yourdomain.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">客户端引导链接 (可选)</label>
                    <input type="text" id="client_download_url" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-emerald-500/50 outline-none transition-all placeholder-gray-400" placeholder="https://emby.media/download.html">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">入职欢迎语 (可选)</label>
                    <textarea id="welcome_message" rows="2" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-emerald-500/50 outline-none transition-all placeholder-gray-400 custom-scrollbar" placeholder="推荐使用 Infuse 客户端登录，祝观影愉快。"></textarea>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/80 flex flex-col">
            <div class="px-5 py-3.5 border-b border-gray-100 dark:border-gray-700/50 flex items-center gap-2.5 bg-gray-50/50 dark:bg-gray-800/30 rounded-t-xl">
                <i class="fa-solid fa-bolt text-purple-500 text-base"></i>
                <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm">MoviePilot 自动化流水线</h3>
            </div>
            <div class="p-5 flex-1 flex flex-col space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">通信地址</label>
                    <input type="text" id="moviepilot_url" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-purple-500/50 outline-none transition-all placeholder-gray-400" placeholder="http://192.168.31.2:3000">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">API Token</label>
                    <div class="relative">
                        <input type="password" id="moviepilot_token" class="w-full pl-3 pr-10 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-purple-500/50 outline-none transition-all">
                        <button type="button" onclick="toggleShow('moviepilot_token')" class="absolute right-1 top-1/2 -translate-y-1/2 w-8 h-8 text-gray-400 hover:text-purple-500 transition-colors">
                            <i id="icon-moviepilot_token" class="fa-solid fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">Pulse 审批回跳地址</label>
                    <input type="text" id="pulse_url" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-purple-500/50 outline-none transition-all placeholder-gray-400" placeholder="https://yj.esa.cchmm.cn">
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/80 flex flex-col">
            <div class="px-5 py-3.5 border-b border-gray-100 dark:border-gray-700/50 flex items-center gap-2.5 bg-gray-50/50 dark:bg-gray-800/30 rounded-t-xl">
                <i class="fa-solid fa-network-wired text-blue-500 text-base"></i>
                <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm">TMDB & 网络</h3>
            </div>
            <div class="p-5 flex-1 flex flex-col space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">TMDB API Key (v3)</label>
                    <div class="relative">
                        <input type="password" id="tmdb_api_key" class="w-full pl-3 pr-10 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-blue-500/50 outline-none transition-all">
                        <button type="button" onclick="toggleShow('tmdb_api_key')" class="absolute right-1 top-1/2 -translate-y-1/2 w-8 h-8 text-gray-400 hover:text-blue-500 transition-colors">
                            <i id="icon-tmdb_api_key" class="fa-solid fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">系统全局科学代理 (可选)</label>
                    <input type="text" id="proxy_url" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-blue-500/50 outline-none transition-all placeholder-gray-400" placeholder="http://127.0.0.1:7890">
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/80 flex flex-col">
            <div class="px-5 py-3.5 border-b border-gray-100 dark:border-gray-700/50 flex items-center gap-2.5 bg-gray-50/50 dark:bg-gray-800/30 rounded-t-xl">
                <i class="fa-solid fa-shield-halved text-orange-500 text-base"></i>
                <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm">Webhook 安全</h3>
            </div>
            <div class="p-5 flex-1 flex flex-col space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">验证 Token</label>
                    <input type="text" id="webhook_token" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 font-mono focus:ring-2 focus:ring-orange-500/50 outline-none transition-all">
                </div>
                <div class="bg-slate-50 dark:bg-gray-900/50 p-3 rounded-lg border border-slate-200 dark:border-gray-700 mt-2">
                    <p class="text-[10px] text-slate-500 font-bold mb-1 uppercase tracking-wider">填入 Emby 的完整 URL：</p>
                    <p class="text-xs font-mono text-orange-600 dark:text-orange-400 break-all select-all leading-relaxed" id="webhook-url-preview">...</p>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/80 flex flex-col">
            <div class="px-5 py-3.5 border-b border-gray-100 dark:border-gray-700/50 flex items-center gap-2.5 bg-gray-50/50 dark:bg-gray-800/30 rounded-t-xl">
                <i class="fa-solid fa-user-ninja text-gray-500 text-base"></i>
                <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm">隐藏黑名单</h3>
            </div>
            <div class="p-5 flex-1 flex flex-col space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">添加不参与排行的账号</label>
                    <div class="flex gap-2">
                        <select id="user-selector" class="flex-1 px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-700 dark:text-gray-300 outline-none focus:ring-2 focus:ring-gray-400 transition-all cursor-pointer">
                            <option value="">选择用户...</option>
                        </select>
                        <button onclick="addHiddenUser()" class="px-4 py-2 bg-gray-800 dark:bg-gray-700 hover:bg-black dark:hover:bg-gray-600 text-white rounded-lg text-xs font-bold shadow-sm transition-all active:scale-95 shrink-0">添加</button>
                    </div>
                </div>
                <div id="hidden-users-container" class="flex flex-wrap gap-2 empty:hidden pt-1">
                    </div>
            </div>
        </div>

    </div>
</div>

<script>
// --- JS 逻辑保持不变 ---
let allUsers = [];
let hiddenUsers = [];

document.addEventListener('DOMContentLoaded', async () => {
    const uRes = await fetch('/api/users');
    const uJson = await uRes.json();
    if(uJson.status === 'success') {
        allUsers = uJson.data;
        const sel = document.getElementById('user-selector');
        allUsers.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.UserId;
            opt.textContent = u.UserName;
            sel.appendChild(opt);
        });
    }
    loadSettings();
});

async function loadSettings() {
    const res = await fetch('/api/settings');
    const json = await res.json();
    if (json.status === 'success') {
        const d = json.data;
        document.getElementById('emby_host').value = d.emby_host || '';
        document.getElementById('emby_api_key').value = d.emby_api_key || '';
        document.getElementById('tmdb_api_key').value = d.tmdb_api_key || '';
        document.getElementById('proxy_url').value = d.proxy_url || '';
        document.getElementById('webhook_token').value = d.webhook_token || '';
        document.getElementById('emby_public_url').value = d.emby_public_url || '';
        document.getElementById('welcome_message').value = d.welcome_message || '';
        document.getElementById('client_download_url').value = d.client_download_url || '';
        document.getElementById('moviepilot_url').value = d.moviepilot_url || '';
        document.getElementById('moviepilot_token').value = d.moviepilot_token || '';
        document.getElementById('pulse_url').value = d.pulse_url || '';

        hiddenUsers = d.hidden_users || [];
        renderHiddenUsers();
        updateWebhookPreview();
    }
}

function renderHiddenUsers() {
    const container = document.getElementById('hidden-users-container');
    container.innerHTML = '';
    hiddenUsers.forEach(uid => {
        const user = allUsers.find(u => u.UserId === uid);
        const name = user ? user.UserName : uid;
        
        const tag = document.createElement('div');
        tag.className = 'flex items-center gap-1.5 px-2.5 py-1 bg-gray-100 dark:bg-gray-700 rounded-md text-xs font-bold text-gray-700 dark:text-gray-300 border border-gray-200 dark:border-gray-600';
        tag.innerHTML = `
            <span>${name}</span>
            <button onclick="removeHiddenUser('${uid}')" class="text-gray-400 hover:text-red-500 focus:outline-none">
                <i class="fa-solid fa-xmark"></i>
            </button>
        `;
        container.appendChild(tag);
    });
}

function addHiddenUser() {
    const sel = document.getElementById('user-selector');
    const uid = sel.value;
    if (uid && !hiddenUsers.includes(uid)) {
        hiddenUsers.push(uid);
        renderHiddenUsers();
    }
    sel.value = '';
}

function removeHiddenUser(uid) {
    hiddenUsers = hiddenUsers.filter(id => id !== uid);
    renderHiddenUsers();
}

function updateWebhookPreview() {
    const token = document.getElementById('webhook_token').value;
    const host = window.location.origin;
    document.getElementById('webhook-url-preview').textContent = `${host}/api/v1/webhook?token=${token}`;
}

document.getElementById('webhook_token').addEventListener('input', updateWebhookPreview);

async function saveSettings() {
    const data = {
        emby_host: document.getElementById('emby_host').value,
        emby_api_key: document.getElementById('emby_api_key').value,
        tmdb_api_key: document.getElementById('tmdb_api_key').value,
        proxy_url: document.getElementById('proxy_url').value,
        webhook_token: document.getElementById('webhook_token').value,
        hidden_users: hiddenUsers,
        emby_public_url: document.getElementById('emby_public_url').value,
        welcome_message: document.getElementById('welcome_message').value,
        client_download_url: document.getElementById('client_download_url').value,
        moviepilot_url: document.getElementById('moviepilot_url').value,
        moviepilot_token: document.getElementById('moviepilot_token').value,
        pulse_url: document.getElementById('pulse_url').value
    };

    const btnBtn = document.getElementById('top-save-btn');
    const textSpan = document.getElementById('save-btn-text');
    const icon = btnBtn.querySelector('i');
    
    icon.className = "fa-solid fa-spinner fa-spin";
    textSpan.textContent = "保存中...";
    btnBtn.disabled = true;
    
    try {
        const res = await fetch('/api/settings', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const json = await res.json();
        
        icon.className = "fa-solid fa-check";
        textSpan.textContent = "保存成功";
        btnBtn.classList.replace('bg-indigo-600', 'bg-emerald-500');
        btnBtn.classList.replace('hover:bg-indigo-700', 'hover:bg-emerald-600');
        
        setTimeout(() => {
            icon.className = "fa-solid fa-floppy-disk";
            textSpan.textContent = "保存配置";
            btnBtn.classList.replace('bg-emerald-500', 'bg-indigo-600');
            btnBtn.classList.replace('hover:bg-emerald-600', 'hover:bg-indigo-700');
            btnBtn.disabled = false;
        }, 1500);
        
    } catch(e) {
        alert("网络请求失败");
        icon.className = "fa-solid fa-floppy-disk";
        textSpan.textContent = "保存配置";
        btnBtn.disabled = false;
    }
}

function toggleShow(id) {
    const input = document.getElementById(id);
    const icon = document.getElementById('icon-' + id);
    if(input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}
</script>

<style>
.custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
.dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
</style>
{% endblock %}
