{% extends "layout.html" %}
{% block title %}映迹工坊 - 旗舰版{% endblock %}
{% block head %}
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<style>
    html, body { height: 100%; margin: 0; background: #f3f4f6; overflow: hidden; }
    .app-container { display: flex; height: 100%; }
    
    .preview-area { 
        flex: 1; overflow-y: auto; display: flex; justify-content: center; align-items: flex-start; 
        padding: 40px 20px; padding-top: 30px; padding-bottom: 140px;
        background-color: #e5e7eb; -webkit-overflow-scrolling: touch; 
        transition: background-color 0.3s;
    }
    
    .control-panel { 
        width: 360px; background: white; padding: 20px; border-left: 1px solid #ddd; 
        z-index: 50; display: block; box-shadow: -5px 0 15px rgba(0,0,0,0.05); overflow-y: auto; 
        transition: all 0.3s;
    }
    
    .mobile-toolbar { 
        display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; 
        background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
        border-top: 1px solid rgba(0,0,0,0.1); z-index: 500; 
        align-items: center; justify-content: space-between; padding: 0 15px; 
        box-sizing: border-box; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); 
    }
    .toolbar-btn { flex: 1; height: 44px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-config { background: #f3f4f6; color: #333; margin-right: 10px; border: 1px solid #ddd; }
    .btn-save { background: #16a34a; color: white; flex: 1.5; box-shadow: 0 2px 8px rgba(22, 163, 74, 0.3); }
    
    .bottom-sheet { 
        display: block; visibility: hidden; position: fixed; bottom: 0; left: 0; width: 100%; 
        background: white; border-radius: 20px 20px 0 0; padding: 25px; padding-bottom: 40px; 
        box-shadow: 0 -10px 40px rgba(0,0,0,0.2); z-index: 600; 
        transform: translateY(100%); transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); 
        max-height: 85vh; overflow-y: auto; 
    }
    .bottom-sheet.active { visibility: visible; transform: translateY(0); }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .sheet-title { font-weight: 900; font-size: 18px; color: #333; }
    .sheet-close { width: 30px; height: 30px; border-radius: 50%; background: #f3f4f6; display: flex; align-items: center; justify-content: center; color: #666; cursor: pointer; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 550; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .overlay.active { opacity: 1; pointer-events: auto; }
    
    @media (max-width: 768px) { 
        .app-container { flex-direction: column; } 
        .control-panel { display: none !important; } 
        .mobile-toolbar { display: flex; } 
        .preview-area { align-items: flex-start; } 
    }
    
    /* 🔥 全局变量定义：动态适配亮/暗主题 */
    :root { 
        --theme-bg: #1a1a1a; 
        --theme-card: rgba(255,255,255,0.08); 
        --theme-text: white; 
        --theme-highlight: #eab308;
        --theme-pill-bg: rgba(255,255,255,0.15); /* 高亮字块背景色 */
        --theme-pill-text: white; /* 高亮字块文字色 */
    }
    
    .poster-canvas { 
        width: 400px; height: fit-content; min-height: auto; padding-bottom: 20px; 
        background: var(--theme-bg); color: var(--theme-text); position: relative; 
        overflow: hidden; display: flex; flex-direction: column; 
        box-shadow: 0 30px 60px rgba(0,0,0,0.5); line-height: 1.6; 
        font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif !important; 
        transition: background 0.3s; transform-origin: top center; 
    }
    
    /* 去掉了 filter: blur，改由 JS 物理渲染画布 */
    #poster-bg-img { position: absolute; inset: 0; z-index: 0; background-size: cover; background-position: center; transform: scale(1.2); opacity: 0; transition: opacity 0.5s; height: 100%; }
    #poster-bg-gradient { position: absolute; inset: 0; z-index: 1; background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%); height: 100%; }
    
    .p-content { position: relative; z-index: 10; padding: 40px 30px; display: block; }
    .p-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .user-box { display: flex; align-items: center; gap: 12px; }
    
    .avatar { 
        width: 54px; height: 54px; border-radius: 50%; 
        background-color: #e5e7eb; display: flex; align-items: center; justify-content: center; 
        font-size: 26px; color: white; border: 2px solid rgba(255,255,255,0.8); 
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        background-size: cover !important; background-position: center !important; background-repeat: no-repeat !important;
        z-index: 20; position: relative;
    }
    
    .user-info h1 { font-size: 24px; font-weight: 900; margin: 0; padding: 4px 0; color: var(--theme-text); }
    .user-info p { font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; margin: 0; padding-bottom: 2px; color: var(--theme-text); }
    
    .server-pill { background: var(--theme-card); padding: 4px 10px; border-radius: 20px; font-size: 10px; border: 1px solid rgba(255,255,255,0.1); text-align: center; color: var(--theme-text); }
    .server-pill span { display: block; font-weight: 900; font-size: 12px; color: #4ade80; padding-bottom: 2px; }
    
    .stats-row { display: flex; gap: 10px; margin-bottom: 25px; }
    .stat-card { flex: 1; background: var(--theme-card); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; backdrop-filter: blur(10px); }
    .stat-val { font-size: 28px; font-weight: 900; line-height: 1; margin-bottom: 4px; padding-bottom: 4px; color: var(--theme-text); }
    .stat-label { font-size: 9px; opacity: 0.6; text-transform: uppercase; font-weight: bold; color: var(--theme-text); }
    
    .podium-container { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin-bottom: 30px; margin-top: 10px; }
    .podium-item { position: relative; display: flex; flex-direction: column; align-items: center; }
    .podium-item.rank-2, .podium-item.rank-3 { width: 95px; }
    .podium-item.rank-1 { width: 115px; z-index: 10; }
    
    .podium-cover { width: 100%; aspect-ratio: 2/3; border-radius: 8px; background-color: #333; background-size: cover; background-position: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); position: relative; border: 2px solid transparent; }
    .podium-item.rank-1 .podium-cover { border-color: #eab308; box-shadow: 0 0 20px rgba(234, 179, 8, 0.4); }
    .podium-item.rank-2 .podium-cover { border-color: #94a3b8; }
    .podium-item.rank-3 .podium-cover { border-color: #b45309; }
    
    .medal { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: white; z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    .medal.rank-1 { background: linear-gradient(135deg, #fcd34d, #b45309); width: 32px; height: 32px; top: -16px; font-size: 14px; }
    .medal.rank-2 { background: linear-gradient(135deg, #e2e8f0, #64748b); }
    .medal.rank-3 { background: linear-gradient(135deg, #fdba74, #9a3412); }
    
    .podium-info { text-align: center; margin-top: 8px; width: 100%; color: var(--theme-text); }
    .podium-title { font-size: 11px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; padding-bottom: 4px; }
    .podium-meta { font-size: 9px; opacity: 0.7; }
    
    .rank-list { display: flex; flex-direction: column; gap: 8px; }
    .rank-row { display: flex; align-items: center; padding: 10px 10px; background: var(--theme-card); border-radius: 10px; backdrop-filter: blur(5px); min-height: 50px; color: var(--theme-text); }
    .rank-idx { font-size: 12px; font-weight: 900; opacity: 0.4; width: 25px; text-align: center; }
    .rank-poster-sm { width: 32px; height: 48px; border-radius: 4px; background-color: #333; background-size: cover; background-position: center; margin-right: 12px; flex-shrink: 0; position: relative; overflow: hidden; }
    .rank-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .rank-name { font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-bottom: 4px; margin-bottom: -2px; }
    .rank-meta-row { font-size: 9px; opacity: 0.7; display: flex; gap: 8px; }
    
    /* 情绪模块 */
    .mood-area { margin-top: 25px; display: flex; flex-direction: column; gap: 15px; }
    .mood-card { background: linear-gradient(135deg, var(--theme-card), rgba(255,255,255,0.02)); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; position: relative; overflow: hidden; color: var(--theme-text); }
    .mood-icon { position: absolute; right: -10px; bottom: -15px; font-size: 60px; opacity: 0.08; transform: rotate(-15deg); }
    .mood-title { font-size: 10px; font-weight: 900; letter-spacing: 1px; color: var(--theme-highlight); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .mood-text { font-size: 12px; line-height: 1.6; opacity: 0.9; }
    .mood-highlight { font-weight: bold; color: var(--theme-pill-text); background: var(--theme-pill-bg); padding: 0 4px; border-radius: 4px; }
    
    .p-footer { margin-top: 30px; text-align: center; opacity: 0.4; font-size: 10px; letter-spacing: 2px; color: var(--theme-text); }
    .empty-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.4; min-height: 200px; text-align: center; color: var(--theme-text); }
    
    /* 控件样式 */
    .ctrl-label { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 8px; display: block; }
    .btn-group { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
    .btn { flex: 1; padding: 10px; border: 1px solid #ddd; background: #fff; font-weight: bold; border-radius: 8px; font-size: 12px; cursor: pointer; min-width: 60px; white-space: nowrap; color: #374151; transition: all 0.2s; }
    .btn.active { background: #111827; color: white; border-color: #111827; }
    .theme-dots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
    .dot { height: 40px; border-radius: 8px; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; font-weight: bold; text-shadow: 0 1px 2px black; }

    html.dark body { background: #111827 !important; }
    html.dark .preview-area { background-color: #0f172a; } 
    html.dark .control-panel { background: #1f2937; border-left-color: #374151; }
    html.dark .mobile-toolbar { background: rgba(31, 41, 55, 0.95); border-top-color: #374151; }
    html.dark .toolbar-btn.btn-config { background: #374151; color: white; border-color: #4b5563; }
    html.dark .bottom-sheet { background: #1f2937; color: #e5e7eb; }
    html.dark .sheet-title { color: white; }
    html.dark .sheet-close { background: #374151; color: white; }
    html.dark .ctrl-label { color: #d1d5db; }
    html.dark .btn { background: #374151; border-color: #4b5563; color: #e5e7eb; }
    html.dark .btn.active { background: #f3f4f6; color: #111827; border-color: #fff; }
    html.dark .btn:hover:not(.active) { background: #4b5563; }
    .ctrl-select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; background: #f9fafb; color: #333; outline: none; }
    html.dark .ctrl-select { background-color: #374151; border-color: #4b5563; color: white; }
</style>
{% endblock %}

{% block content %}
<script>
    window.tmdbCache = {};
    window.fallbackReportPoster = async function(el, title) {
        if(el.getAttribute('data-fallback-done')) return;
        el.setAttribute('data-fallback-done', 'true');
        
        el.style.backgroundImage = "url('/static/img/logo-app-2.png')";
        el.style.backgroundSize = "contain";
        el.style.backgroundRepeat = "no-repeat";
        
        if(window.tmdbCache[title]) {
            el.style.backgroundImage = `url('${window.tmdbCache[title]}')`;
            el.style.backgroundSize = "cover";
            return;
        }

        try {
            const res = await fetch(`/api/requests/search?query=${encodeURIComponent(title)}`);
            const data = await res.json();
            if (data.status === 'success' && data.data.length > 0) {
                const match = data.data.find(d => d.poster_path) || data.data[0];
                if (match.poster_path) {
                    window.tmdbCache[title] = match.poster_path;
                    const b64 = await toBase64(match.poster_path);
                    if(b64) {
                        el.style.backgroundImage = `url('${b64}')`;
                        el.style.backgroundSize = "cover";
                    }
                }
            }
        } catch(e) {}
    };

    // 🔥 物理级模糊引擎：利用 Canvas 强行渲染模糊背景，解决 html2canvas 无法截取滤镜的终极绝杀！
    async function applyPhysicalBlur(base64Url) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 400; // 匹配海报宽度
                canvas.height = 800; // 匹配海报高度估计
                
                // 物理模糊核心
                ctx.filter = 'blur(40px) brightness(0.4)';
                
                // 绘制背景
                const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width / 2) - (img.width / 2) * scale;
                const y = (canvas.height / 2) - (img.height / 2) * scale;
                ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                
                resolve(canvas.toDataURL('image/jpeg', 0.8));
            };
            img.onerror = () => resolve(base64Url);
            img.src = base64Url;
        });
    }
</script>

{% block scripts %}
<script>
    window.onerror = function(msg) { alert("发生错误: " + msg); return false; };
</script>
<script>
    let currentUserId = '';
    let currentUserName = 'User';
    let currentPeriod = 'month';
    let isCoverBgEnabled = false;
    let top1PhysicalBlurredBase64 = null;

    function checkLayout() {
        const isMobile = window.innerWidth <= 768;
        const controlsHTML = document.getElementById('mobile-controls-container').innerHTML;
        const desktopContainer = document.getElementById('desktop-controls-container');
        if (!isMobile && desktopContainer.innerHTML.trim() === '') {
            desktopContainer.innerHTML = controlsHTML + 
            `<button onclick="savePoster()" id="pc-save-btn" style="width: 100%; padding: 12px; background: #16a34a; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 14px; margin-top: 20px;"><i class="fa-solid fa-download"></i> 保存海报</button>`;
        }
    }
    window.addEventListener('resize', () => { fitScale(); checkLayout(); });
    setTimeout(() => { fitScale(); checkLayout(); }, 100);

    function toggleSheet(forceState) {
        const sheet = document.getElementById('mobile-sheet');
        const overlay = document.getElementById('mobile-overlay');
        let shouldShow = typeof forceState === 'boolean' ? forceState : !sheet.classList.contains('active');
        if(shouldShow) { sheet.classList.add('active'); overlay.classList.add('active'); } 
        else { sheet.classList.remove('active'); overlay.classList.remove('active'); }
    }

    function fitScale() {
        const wrapper = document.querySelector('.preview-area');
        const w = wrapper.clientWidth;
        const scale = Math.min((w - 40) / 400, 1);
        document.getElementById('scale-wrapper').style.transform = `scale(${scale})`;
        document.getElementById('scale-wrapper').style.transformOrigin = 'top center';
    }

    async function toBase64(url) {
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`); 
            const blob = await res.blob();
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        } catch(e) { return null; }
    }

    function getDateLabel(period) {
        const now = new Date();
        const y = now.getFullYear();
        const m = now.getMonth() + 1;
        if (period === 'year') return `${y} 年度观影报告`;
        if (period === 'month') return `${y}年${m}月 观影报告`;
        if (period === 'week') {
            const day = now.getDay() || 7; 
            const start = new Date(now); start.setDate(now.getDate() - day + 1);
            const end = new Date(now); end.setDate(now.getDate() - day + 7);
            const fmt = d => `${d.getMonth()+1}月${d.getDate()}日`;
            return `${fmt(start)} - ${fmt(end)} 观影周报`;
        }
        return '历史全量 观影报告';
    }

    function setTheme(bg, text, hl) {
        const canvas = document.querySelector('.poster-canvas');
        canvas.style.background = bg;
        canvas.style.color = text;
        
        document.documentElement.style.setProperty('--theme-highlight', hl);
        
        if(text === '#333') {
            // 纯白主题下，高亮块背景变深，文字变白
            document.documentElement.style.setProperty('--theme-pill-bg', '#333');
            document.documentElement.style.setProperty('--theme-pill-text', 'white');
            document.documentElement.style.setProperty('--theme-card', 'rgba(0,0,0,0.05)');
            if(!isCoverBgEnabled) document.getElementById('poster-bg-gradient').style.background = 'transparent';
        } else {
            // 深色主题下，高亮块背景变半透白，文字变白
            document.documentElement.style.setProperty('--theme-pill-bg', 'rgba(255,255,255,0.15)');
            document.documentElement.style.setProperty('--theme-pill-text', 'white');
            document.documentElement.style.setProperty('--theme-card', 'rgba(255,255,255,0.08)');
            if(!isCoverBgEnabled) document.getElementById('poster-bg-gradient').style.background = 'linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.5))';
        }
        
        if(!isCoverBgEnabled) {
            document.getElementById('poster-bg-img').style.opacity = '0';
        }
    }

    function toggleCoverBg() {
        isCoverBgEnabled = !isCoverBgEnabled;
        const bgImg = document.getElementById('poster-bg-img');
        
        if(!isCoverBgEnabled) {
            bgImg.style.opacity = '0';
            // 恢复当前主题原状
            const currentColor = document.querySelector('.poster-canvas').style.color;
            if(currentColor === 'rgb(51, 51, 51)' || currentColor === '#333') {
                document.getElementById('poster-bg-gradient').style.background = 'transparent';
            } else {
                document.getElementById('poster-bg-gradient').style.background = 'linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.5))';
            }
        } else {
            bgImg.style.opacity = '1';
            // 强行转为深色氛围适应背景图
            document.documentElement.style.setProperty('--theme-card', 'rgba(255,255,255,0.08)');
            document.documentElement.style.setProperty('--theme-pill-bg', 'rgba(255,255,255,0.15)');
            document.documentElement.style.setProperty('--theme-pill-text', 'white');
            document.querySelector('.poster-canvas').style.color = 'white';
            document.getElementById('poster-bg-gradient').style.background = 'linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%)';
        }
    }

    function getIconAvatar(name) {
        const icons = ['fa-robot', 'fa-cat', 'fa-ghost', 'fa-dragon', 'fa-user-astronaut', 'fa-snowman', 'fa-frog', 'fa-hippo', 'fa-dog', 'fa-otter'];
        const colors = ['#FFC0CB', '#FFB6C1', '#FF69B4', '#E6E6FA', '#D8BFD8', '#B0C4DE', '#ADD8E6', '#87CEFA', '#98FB98', '#90EE90'];
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        return { icon: icons[Math.abs(hash % icons.length)], color: colors[Math.abs(hash % colors.length)] };
    }

    async function loadAvatar() {
        const avatarEl = document.getElementById('p-avatar');
        avatarEl.style.backgroundImage = 'none';
        avatarEl.innerText = '';
        
        if (currentUserId === 'all') {
            avatarEl.style.background = 'linear-gradient(135deg, #1a1a1a, #333)';
            avatarEl.innerHTML = '<i class="fa-solid fa-server"></i>';
            avatarEl.style.color = 'white';
            return;
        }
        
        const realUrl = `/api/proxy/user_image/${currentUserId}`;
        const b64 = await toBase64(realUrl);

        if (b64) {
            avatarEl.style.backgroundImage = `url('${b64}')`;
            avatarEl.innerHTML = ''; 
        } else {
            const style = getIconAvatar(currentUserName);
            avatarEl.style.backgroundColor = style.color;
            avatarEl.innerHTML = `<i class="fa-solid ${style.icon}"></i>`;
            avatarEl.style.color = 'white'; 
        }
    }

    async function init() {
        const res = await fetch('/api/users');
        const json = await res.json();
        const selects = document.querySelectorAll('#user-select');
        selects.forEach(sel => {
            sel.innerHTML = '';
            const optAll = document.createElement('option');
            optAll.value = 'all'; optAll.innerText = '全服概览 (All Users)';
            sel.appendChild(optAll);
            if(json.data) {
                json.data.forEach(u => {
                    const opt = document.createElement('option');
                    opt.value = u.UserId; opt.innerText = u.UserName;
                    sel.appendChild(opt);
                });
            }
        });
        changeUser('all');
    }

    function changeUser(uid) {
        currentUserId = uid;
        document.querySelectorAll('#user-select').forEach(s => s.value = uid);
        const sel = document.querySelector('#user-select');
        for(let opt of sel.options) { if(opt.value === uid) { currentUserName = opt.text; break; } }
        if(uid === 'all') currentUserName = 'Emby Server';

        document.getElementById('p-user').innerText = currentUserName;
        loadAvatar();
        loadData();
    }

    function setPeriod(p, btn) {
        currentPeriod = p;
        document.querySelectorAll('.btn-group .btn').forEach(b => {
            if(b.innerText === btn.innerText) b.classList.add('active');
            else b.classList.remove('active');
        });
        loadData();
    }

    function renderMoods(moodData) {
        const area = document.getElementById('mood-area');
        area.innerHTML = '';
        let html = '';
        
        if(moodData.genres && moodData.genres.length > 0) {
            html += `
            <div class="mood-card">
                <i class="fa-solid fa-dna mood-icon"></i>
                <div class="mood-title"><i class="fa-solid fa-flask"></i> 观影基因</div>
                <div class="mood-text">你的灵魂由 <span class="mood-highlight">${moodData.genres.join(' / ')}</span> 构成。这是一个独一无二的宇宙。</div>
            </div>`;
        }
        
        if(moodData.binge_day && currentUserId !== 'all') {
            html += `
            <div class="mood-card">
                <i class="fa-solid fa-couch mood-icon"></i>
                <div class="mood-title"><i class="fa-solid fa-fire"></i> 沉迷时刻</div>
                <div class="mood-text"><span class="mood-highlight">${moodData.binge_day.date}</span> 是你最疯狂的一天，一口气观看了 <span class="mood-highlight">${moodData.binge_day.hours}</span> 小时。</div>
            </div>`;
        }
        
        if(moodData.late_night && currentUserId !== 'all') {
            html += `
            <div class="mood-card">
                <i class="fa-solid fa-moon mood-icon"></i>
                <div class="mood-title"><i class="fa-solid fa-owl"></i> 深夜刺客</div>
                <div class="mood-text"><span class="mood-highlight">${moodData.late_night.date} 凌晨 ${moodData.late_night.time}</span>，整座城市都沉睡了，你还在独自沉浸在《${moodData.late_night.name}》里。夜深了，注意保护眼睛。</div>
            </div>`;
        }
        
        area.innerHTML = html;
    }

    async function loadData() {
        if(!currentUserId) return;
        const res = await fetch(`/api/stats/poster_data?user_id=${currentUserId}&period=${currentPeriod}`);
        const json = await res.json();
        const data = json.data;

        document.getElementById('p-period').innerText = getDateLabel(currentPeriod);
        document.getElementById('p-plays').innerText = data.plays;
        document.getElementById('p-hours').innerText = data.hours;
        document.getElementById('p-server').innerText = data.server_plays;
        
        top1PhysicalBlurredBase64 = null;

        const hasData = data.plays > 0;
        document.getElementById('content-area').style.display = hasData ? 'block' : 'none';
        document.getElementById('empty-area').style.display = hasData ? 'none' : 'flex';

        if(hasData) {
            const list = data.top_list;
            const podiumArea = document.getElementById('podium-area');
            
            ['rank1-box', 'rank2-box', 'rank3-box'].forEach(id => document.getElementById(id).style.visibility = 'hidden');
            
            if(list.length > 0) {
                podiumArea.style.display = 'flex';
                
                const renderRank = async (rank, idx) => {
                    const el = document.getElementById(`rank${rank}-box`);
                    if(list[idx]) {
                        el.style.visibility = 'visible';
                        document.getElementById(`rank${rank}-title`).innerText = list[idx].ItemName;
                        const h = Math.round(list[idx].Duration/3600);
                        document.getElementById(`rank${rank}-meta`).innerText = `${list[idx].Count}次${h > 0 ? ` · ${h}h` : ''}`;
                        
                        const imgUrl = `/api/proxy/image/${list[idx].ItemId}/primary`;
                        const realImg = document.getElementById(`rank${rank}-img`);
                        realImg.dataset.title = list[idx].ItemName;
                        realImg.removeAttribute('data-fallback-done');
                        realImg.src = imgUrl; 
                        
                        const b64 = await toBase64(imgUrl);
                        const coverBg = document.getElementById(`rank${rank}-bg`);
                        if(b64) {
                            coverBg.style.backgroundImage = `url('${b64}')`;
                            if(rank === 1) {
                                // 🔥 在后台悄悄生成物理模糊版本的图，专供 html2canvas 截图使用
                                top1PhysicalBlurredBase64 = await applyPhysicalBlur(b64);
                                // 同时为了预览，我们先把背景设置为正常图(因为CSS里我们移除了blur，所以我们直接用物理模糊图做背景)
                                document.getElementById('poster-bg-img').style.backgroundImage = `url('${top1PhysicalBlurredBase64}')`;
                            }
                        }
                    }
                };
                
                await Promise.all([renderRank(1, 0), renderRank(2, 1), renderRank(3, 2)]);
            } else { podiumArea.style.display = 'none'; }

            const listEl = document.getElementById('rank-list');
            let html = '';
            const max = Math.min(list.length, 10);
            for(let i=3; i<max; i++) {
                const hours = Math.round(list[i].Duration/3600);
                const imgUrl = `/api/proxy/image/${list[i].ItemId}/primary`;
                html += `
                <div class="rank-row">
                    <div class="rank-idx">${i+1}</div>
                    <div class="rank-poster-sm" id="sm-bg-${i}">
                        <img src="${imgUrl}" data-title="${list[i].ItemName}" style="opacity:0; position:absolute; z-index:-1;" onerror="fallbackReportPoster(document.getElementById('sm-bg-${i}'), this.dataset.title)">
                    </div>
                    <div class="rank-info">
                        <div class="rank-name">${list[i].ItemName}</div>
                        <div class="rank-meta-row"><span>${list[i].Count}次</span><span>${hours > 0 ? hours+'h' : '<1h'}</span></div>
                    </div>
                </div>`;
            }
            listEl.innerHTML = html;
            
            setTimeout(async () => {
                for(let i=3; i<max; i++) {
                    const imgUrl = `/api/proxy/image/${list[i].ItemId}/primary`;
                    const b64 = await toBase64(imgUrl);
                    if(b64) document.getElementById(`sm-bg-${i}`).style.backgroundImage = `url('${b64}')`;
                }
            }, 100);
            
            if(data.mood_data) renderMoods(data.mood_data);
        }
    }

    async function savePoster() {
        const btns = document.querySelectorAll('#save-btn, #mobile-save-btn, #pc-save-btn');
        btns.forEach(b => b.innerText = '生成中...');
        toggleSheet(false); 

        const wrapper = document.getElementById('scale-wrapper');
        const oldT = wrapper.style.transform;
        wrapper.style.transform = 'none';
        await new Promise(r => setTimeout(r, 200)); 
        
        try {
            // 🔥 此时背景图已经是经过 Canvas 处理过的物理模糊图，html2canvas 截出来绝对不会露馅！
            const canvas = await html2canvas(document.getElementById('capture-target'), { 
                scale: 2, useCORS: true, backgroundColor: null 
            });
            const link = document.createElement('a');
            link.download = `EmbyPulse_${currentUserName}_${currentPeriod}.png`;
            link.href = canvas.toDataURL();
            link.click();
        } catch(e) { alert('生成截图失败，请确保图片已加载完毕。'); } 
        finally { 
            wrapper.style.transform = oldT; 
            btns.forEach(b => b.innerHTML = '<i class="fa-solid fa-download"></i> 保存海报');
        }
    }

    init();
</script>
{% endblock %}
