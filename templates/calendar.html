{% extends "layout.html" %}
{% block title %}追剧排期 - EmbyPulse{% endblock %}

{% block head %}
<style>
    /* === 🔥 Apple 级极简卡片质感 === */
    .apple-card { 
        background-color: rgba(255, 255, 255, 0.95); 
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 24px; 
        padding: 24px; 
        box-shadow: 0 4px 24px -8px rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.02);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    html.dark .apple-card {
        background-color: rgba(28, 28, 30, 0.85); 
        box-shadow: 0 4px 24px -8px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255,255,255,0.04);
    }

    #detail-modal { transition: opacity 0.3s ease-out; }
    #modal-container { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
{% endblock %}

{% block content %}
<div class="w-full max-w-[1600px] mx-auto py-4 pb-32 px-4 sm:px-6 md:px-8 space-y-4 md:space-y-6">
    
    <div class="apple-card flex flex-col md:flex-row md:items-center justify-between gap-6 w-full mb-2 p-5 md:p-6">
        <div class="flex items-center gap-4 pl-1">
            <div class="w-12 h-12 rounded-[14px] bg-brand-500 text-white flex items-center justify-center text-xl shadow-md shadow-brand-500/30 shrink-0">
                <i class="fa-solid fa-calendar-days"></i>
            </div>
            <div>
                <h2 class="text-xl md:text-[22px] font-bold tracking-tight text-gray-900 dark:text-white">追剧排期</h2>
                <div class="text-[12px] text-gray-500 mt-1 font-medium flex items-center gap-1.5">
                    <i class="fa-solid fa-satellite-dish opacity-70"></i> <span>智能联动 Emby 媒体库状态</span>
                </div>
            </div>
        </div>
        
        <div class="flex items-center justify-between md:justify-end gap-3 w-full md:w-auto">
            <div class="flex items-center bg-gray-100 dark:bg-[#2C2C2E] rounded-full p-1 border border-transparent dark:border-white/5 shadow-sm">
                <button onclick="changeWeek(-1)" class="w-8 h-8 rounded-full hover:bg-white dark:hover:bg-[#3A3A3C] text-gray-500 dark:text-gray-400 transition-colors flex items-center justify-center active:scale-95">
                    <i class="fa-solid fa-chevron-left text-[11px]"></i>
                </button>
                <div class="px-4 text-[12px] font-bold text-gray-700 dark:text-gray-200 min-w-[110px] text-center tracking-wide" id="date-range-display">
                    ...
                </div>
                <button onclick="changeWeek(1)" class="w-8 h-8 rounded-full hover:bg-white dark:hover:bg-[#3A3A3C] text-gray-500 dark:text-gray-400 transition-colors flex items-center justify-center active:scale-95">
                    <i class="fa-solid fa-chevron-right text-[11px]"></i>
                </button>
            </div>

            <div class="flex items-center gap-2">
                <div class="relative group hidden sm:block">
                    <select id="ttl-select" onchange="updateTTL(this.value)" class="appearance-none pl-4 pr-8 py-2 bg-gray-100 dark:bg-[#2C2C2E] border border-transparent dark:border-white/5 rounded-full text-[12px] font-bold text-gray-600 dark:text-gray-300 outline-none cursor-pointer hover:bg-gray-200 dark:hover:bg-[#3A3A3C] transition-colors shadow-sm">
                        <option value="3600">缓存 1h</option>
                        <option value="43200">缓存 12h</option>
                        <option value="86400">缓存 1d</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-3 top-[10px] text-[9px] text-gray-400 pointer-events-none"></i>
                </div>
                <button onclick="fetchCalendar(true)" id="refresh-btn" class="w-9 h-9 rounded-full bg-brand-50 hover:bg-brand-100 dark:bg-brand-500/10 dark:hover:bg-brand-500/20 text-brand-600 dark:text-brand-400 transition-colors shadow-sm flex items-center justify-center active:scale-90 border border-brand-200 dark:border-brand-500/20">
                    <i class="fa-solid fa-arrows-rotate text-[13px]"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="mobile-day-nav" class="md:hidden sticky top-[72px] z-30 -mx-4 px-4 py-3 bg-apple-bgLight/80 dark:bg-apple-bgDark/80 backdrop-blur-[24px] saturate-[1.5] border-b border-gray-200/50 dark:border-white/5 flex gap-2 overflow-x-auto no-scrollbar shadow-sm transition-all scroll-smooth">
    </div>

    <div id="loading" class="flex flex-col items-center justify-center py-40">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-brand-500 mb-4"></i>
        <p class="mt-2 text-[11px] font-bold text-gray-500 dark:text-gray-400 animate-pulse tracking-widest uppercase">正在同步排期矩阵...</p>
    </div>

    <div id="error-msg" class="hidden mx-auto max-w-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800/50 rounded-2xl p-6 text-center mt-10 shadow-sm">
        <p id="error-text" class="text-red-700 dark:text-red-400 text-sm font-bold mb-4"></p>
        <button onclick="fetchCalendar(true)" class="px-6 py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-xl text-[13px] font-bold shadow-md transition-all active:scale-95">重新加载</button>
    </div>

    <div id="calendar-grid" class="hidden grid grid-cols-1 md:grid-cols-7 gap-y-6 md:gap-x-3 lg:gap-x-4 items-start relative pb-10">
    </div>
</div>

<div id="detail-modal" class="fixed inset-0 z-[100] hidden flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity opacity-0 duration-300">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeDetails()"></div>
    
    <div id="modal-container" class="relative w-full sm:w-[90%] max-w-4xl bg-apple-bgLight dark:bg-[#1C1C1E] shadow-[0_-20px_40px_rgba(0,0,0,0.2)] sm:shadow-2xl rounded-t-[32px] sm:rounded-[28px] overflow-hidden transition-transform duration-400 ease-out transform translate-y-full sm:translate-y-0 sm:scale-95 flex flex-col md:flex-row max-h-[92vh] border border-transparent dark:border-white/5">
        
        <button onclick="closeDetails()" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-black/30 hover:bg-black/50 text-white transition-all z-50 backdrop-blur-md">
            <i class="fa-solid fa-xmark text-[13px]"></i>
        </button>
        
        <div class="w-full md:w-[38%] aspect-[4/3] md:aspect-[2/3] relative shrink-0 bg-gray-900 overflow-hidden">
            <img id="m-poster" src="" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-apple-bgLight dark:from-[#1C1C1E] to-transparent md:hidden"></div>
            <div class="hidden md:block absolute inset-y-0 right-0 w-1/4 bg-gradient-to-l from-white dark:from-[#1C1C1E] to-transparent"></div>
        </div>
        
        <div class="flex-1 flex flex-col justify-start p-6 md:p-8 overflow-y-auto mac-scrollbar relative z-20 bg-white dark:bg-transparent">
            <h3 id="m-title" class="text-2xl md:text-3xl font-black text-gray-900 dark:text-white leading-tight pr-6 md:pr-0 mb-3"></h3>
            
            <div class="flex flex-wrap items-center gap-2 mb-5">
                <span id="m-episode-label" class="text-brand-600 dark:text-brand-400 font-mono font-bold bg-brand-50 dark:bg-brand-500/10 px-2 py-1 rounded-md border border-brand-100 dark:border-brand-500/20 text-[11px] md:text-xs"></span>
                <span id="m-status-badge" class="px-2 py-1 rounded-md text-[10px] md:text-[11px] font-bold uppercase tracking-widest text-white shadow-sm"></span>
            </div>
            
            <p class="text-[12px] md:text-[13px] text-gray-500 dark:text-gray-400 font-medium flex items-center gap-1.5 border-b border-gray-100 dark:border-white/5 pb-4 mb-4">
                <i class="fa-regular fa-clock opacity-70"></i> <span id="m-date-val" class="font-mono"></span>
            </p>
            
            <div class="text-[13px] md:text-[14px] text-gray-600 dark:text-gray-300 leading-relaxed flex-1 font-medium">
                <p id="m-description"></p>
            </div>
            
            <div id="m-actions" class="mt-6 pt-5 border-t border-gray-100 dark:border-white/5 shrink-0"></div>
        </div>
    </div>
</div>

<script>
let currentOffset = 0;
let currentServerId = ""; 
let currentEmbyUrl = "";
let isClickScrolling = false; 
let clickScrollTimeout = null;
let lastActiveIndex = -1; 
const imgBase = "https://image.tmdb.org/t/p/w500";

document.addEventListener('DOMContentLoaded', () => fetchCalendar(false));

function changeWeek(offset) {
    currentOffset += offset;
    fetchCalendar(false);
}

async function updateTTL(val) {
    try {
        await fetch('/api/calendar/config', {
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ ttl: parseInt(val) })
        });
        fetchCalendar(true);
    } catch (e) { console.error(e); }
}

async function fetchCalendar(forceRefresh = false) {
    const loadingEl = document.getElementById('loading');
    const gridEl = document.getElementById('calendar-grid');
    const errorEl = document.getElementById('error-msg');
    
    gridEl.classList.add('hidden');
    document.getElementById('mobile-day-nav').innerHTML = ''; 
    loadingEl.classList.remove('hidden');
    errorEl.classList.add('hidden');
    lastActiveIndex = -1;

    try {
        const res = await fetch(`/api/calendar/weekly?refresh=${forceRefresh}&offset=${currentOffset}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        document.getElementById('date-range-display').textContent = 
            (currentOffset === 1 ? "下周 " : currentOffset === -1 ? "上周 " : "") + data.date_range;
        
        if (data.current_ttl) document.getElementById('ttl-select').value = data.current_ttl;

        currentServerId = data.server_id || ""; 
        currentEmbyUrl = data.emby_url || "";
        
        renderMobileNav(data.days);
        renderCalendar(data.days);
        
        setupScrollSpy(); 
        
        loadingEl.classList.add('hidden');
        gridEl.classList.remove('hidden');

        // 默认定位到今天
        if (currentOffset === 0 && window.innerWidth < 768) {
            const todayIndex = data.days.findIndex(d => d.is_today);
            if (todayIndex !== -1) {
                setTimeout(() => scrollToDay(todayIndex), 200); 
            }
        }
    } catch (e) {
        loadingEl.classList.add('hidden');
        document.getElementById('error-text').textContent = e.message;
        errorEl.classList.remove('hidden');
    }
}

function renderMobileNav(days) {
    const navContainer = document.getElementById('mobile-day-nav');
    navContainer.innerHTML = days.map((day, index) => {
        const isToday = day.is_today && currentOffset === 0;
        const baseClass = "nav-btn-item relative flex-1 flex flex-col items-center justify-center py-2 px-1 min-w-[60px] rounded-xl transition-all duration-300 shrink-0 cursor-pointer";
        const stateClass = isToday 
            ? "bg-brand-500 text-white shadow-md shadow-brand-500/30 scale-105" 
            : "bg-white/50 dark:bg-black/20 text-gray-500 dark:text-gray-400 hover:bg-white dark:hover:bg-[#2C2C2E]";
            
        return `
        <button id="nav-btn-${index}" onclick="scrollToDay(${index})" class="${baseClass} ${stateClass}">
            <span class="nav-text text-[11px] font-bold tracking-widest">${isToday ? '今天' : day.weekday_cn}</span>
            <span class="nav-date text-[10px] font-mono mt-0.5 opacity-90">${day.date.slice(5)}</span>
        </button>
        `;
    }).join('');
}

function renderCalendar(days) {
    const container = document.getElementById('calendar-grid');
    
    container.innerHTML = days.map((day, index) => {
        const isToday = day.is_today && currentOffset === 0;
        const dayNum = day.date.split('-')[2];
        
        const itemsHtml = day.items.length === 0 
            ? `<div class="py-10 text-center bg-gray-50/50 dark:bg-black/10 rounded-[20px] border border-dashed border-gray-200/80 dark:border-white/5">
                   <p class="text-[11px] text-gray-400 font-bold tracking-widest">无排期</p>
               </div>`
            : day.items.map(item => generateCardHtml(item)).join('');

        return `
            <div id="day-section-${index}" class="day-section flex flex-col gap-3 md:gap-4 pt-4 relative">
                
                <div class="hidden md:flex flex-col items-center justify-center pb-2 pt-3 mb-1 sticky top-[72px] z-30 bg-apple-bgLight/90 dark:bg-apple-bgDark/90 backdrop-blur-md">
                    <span class="text-[10px] font-bold uppercase tracking-widest mb-1 ${isToday ? 'text-brand-500' : 'text-gray-400 dark:text-gray-500'}">${day.weekday_cn}</span>
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-[15px] font-black ${isToday ? 'bg-brand-500 text-white shadow-md shadow-brand-500/30' : 'text-gray-800 dark:text-gray-200'}">
                        ${dayNum}
                    </div>
                </div>
                
                <div class="md:hidden flex items-center gap-3 pb-1 relative z-10">
                    <span class="font-black text-lg ${isToday ? 'text-brand-500' : 'text-gray-800 dark:text-white'}">${isToday ? '今天' : day.weekday_cn}</span>
                    <span class="text-[11px] font-mono font-bold text-gray-400 mt-1">${day.date.slice(5)}</span>
                    ${isToday ? '<span class="px-2 py-0.5 bg-brand-500 text-white rounded-md text-[9px] font-bold shadow-sm">今 日 更新</span>' : ''}
                    <div class="flex-1 h-px bg-gray-200 dark:bg-white/5"></div>
                </div>

                ${itemsHtml}
            </div>
        `;
    }).join('');
}

function generateCardHtml(item) {
    const statusMap = {
        'ready': { color: 'bg-emerald-50 text-emerald-600 dark:bg-emerald-500/10 dark:text-emerald-400 border border-emerald-200/50 dark:border-emerald-500/20', text: '已入库', dot: 'bg-emerald-500' },
        'missing': { color: 'bg-red-50 text-red-600 dark:bg-red-500/10 dark:text-red-400 border border-red-200/50 dark:border-red-500/20', text: '待补货', dot: 'bg-red-500 animate-pulse' },
        'today': { color: 'bg-brand-50 text-brand-600 dark:bg-brand-500/10 dark:text-brand-400 border border-brand-200/50 dark:border-brand-500/20', text: '今日更新', dot: 'bg-brand-500 animate-pulse' },
        'upcoming': { color: 'bg-blue-50 text-blue-600 dark:bg-blue-500/10 dark:text-blue-400 border border-blue-200/50 dark:border-blue-500/20', text: '待播出', dot: 'bg-blue-500' }
    };
    const s = statusMap[item.status] || { color: 'bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-400 border-transparent', text: '未知', dot: 'bg-gray-500' };
    const poster = item.poster_path ? (imgBase + item.poster_path) : 'https://via.placeholder.com/300x450?text=No+Poster';
    const desc = item.series_overview || item.overview || "暂无剧情简介，静待更新...";
    const formattedAirDate = item.air_date ? item.air_date.replace(/-/g, '.') : '未知';

    return `
    <div onclick='showDetails(${JSON.stringify(item).replace(/'/g, "&apos;")})' 
         class="group flex flex-row md:flex-col bg-white dark:bg-[#1C1C1E] rounded-[20px] overflow-hidden shadow-sm border border-gray-100 dark:border-white/5 cursor-pointer hover:-translate-y-1 transition-all duration-300 hover:shadow-lg h-full">
        
        <div class="relative w-28 sm:w-36 md:w-full shrink-0 aspect-[2/3] bg-gray-100 dark:bg-[#2C2C2E] overflow-hidden border-r md:border-r-0 md:border-b border-gray-100 dark:border-white/5">
            <img src="${poster}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy">
        </div>

        <div class="p-3 sm:p-4 flex-1 flex flex-col justify-start min-w-0">
            <h3 class="text-[13px] md:text-[14px] font-bold text-gray-900 dark:text-white leading-tight line-clamp-2 mb-1.5 transition-colors group-hover:text-brand-500">${item.series_name}</h3>
            
            <div class="flex items-center justify-between mb-2">
                <span class="shrink-0 text-[10px] font-mono font-bold text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-black/30 px-1.5 py-[1px] rounded">
                    S${String(item.season).padStart(2,'0')}E${String(item.episode).padStart(2,'0')}
                </span>
                <span class="text-[10px] font-mono font-medium text-gray-400 truncate ml-2">${formattedAirDate}</span>
            </div>
            
            <p class="text-[11px] text-gray-500 dark:text-gray-400 line-clamp-2 md:line-clamp-3 leading-relaxed mb-3 flex-1">
                ${desc}
            </p>

            <div class="flex items-center w-max px-2 py-0.5 rounded-md ${s.color} mt-auto shadow-sm">
                <span class="w-1.5 h-1.5 rounded-full ${s.dot} mr-1.5"></span>
                <span class="text-[9px] font-bold uppercase tracking-wider">${s.text}</span>
            </div>
        </div>
    </div>
    `;
}

/* ===== 🔥 极度丝滑的高精度滚动引擎 ===== */

// 1. 点击跳转：不再依靠模糊的 Anchor，而是绝对像素定位
function scrollToDay(index) {
    const targetSection = document.getElementById(`day-section-${index}`);
    // 物理锁定滚动容器，绝不找错
    const scrollContainer = document.querySelector('main').parentElement;

    if (targetSection && scrollContainer) {
        // 上锁，防止跳转时的自然滚动触发 Scroll Spy 导致死循环乱跳
        isClickScrolling = true; 
        lastActiveIndex = index;
        
        if (window.innerWidth < 768) {
            highlightNavBtn(index, true); 
        }

        // 精确计算：获取元素相对于滚动容器内的高度 = 元素顶部 - 容器顶部 + 容器已滚动的距离 - 顶部双层毛玻璃高度(130px)
        const rect = targetSection.getBoundingClientRect();
        const containerRect = scrollContainer.getBoundingClientRect();
        const targetScrollTop = scrollContainer.scrollTop + (rect.top - containerRect.top) - 130;
        
        scrollContainer.scrollTo({ top: targetScrollTop, behavior: 'smooth' });

        // 等待平滑滚动完成（一般500ms），解锁
        clearTimeout(clickScrollTimeout);
        clickScrollTimeout = setTimeout(() => { isClickScrolling = false; }, 800);
    }
}

// 2. 滚动侦听：使用 requestAnimationFrame 保障丝滑性能
function setupScrollSpy() {
    if (window.innerWidth >= 768) return; 
    
    // 物理锁定滚动容器
    const scrollContainer = document.querySelector('main').parentElement;
    if (!scrollContainer) return;

    let isThrottled = false;

    scrollContainer.addEventListener('scroll', () => {
        if (isClickScrolling) return; // 如果正在执行点击跳转，则闭嘴

        if (!isThrottled) {
            window.requestAnimationFrame(() => {
                const sections = document.querySelectorAll('.day-section');
                let activeIdx = 0;
                
                // 触发线：距离屏幕顶部约 150px 的位置（正好在横向导航条下面一点点）
                const triggerLine = scrollContainer.getBoundingClientRect().top + 160;

                sections.forEach((sec, idx) => {
                    const rect = sec.getBoundingClientRect();
                    // 只要日期的头部顶破了触发线，就算进入了这一天
                    if (rect.top <= triggerLine) {
                        activeIdx = idx;
                    }
                });

                // 只有跨天了才执行 UI 更新
                if (activeIdx !== lastActiveIndex) {
                    lastActiveIndex = activeIdx;
                    highlightNavBtn(activeIdx, true); 
                }
                
                isThrottled = false;
            });
            isThrottled = true;
        }
    });
}

// 3. 渲染顶部导航并自动居中
function highlightNavBtn(activeIndex, autoCenter = false) {
    document.querySelectorAll('.nav-btn-item').forEach((btn, idx) => {
        if (idx == activeIndex) {
            btn.className = "nav-btn-item relative flex-1 flex flex-col items-center justify-center py-2 px-1 min-w-[60px] rounded-xl transition-all duration-300 shrink-0 cursor-pointer bg-brand-500 text-white shadow-md shadow-brand-500/30 scale-105";
        } else {
            btn.className = "nav-btn-item relative flex-1 flex flex-col items-center justify-center py-2 px-1 min-w-[60px] rounded-xl transition-all duration-300 shrink-0 cursor-pointer bg-white/50 dark:bg-black/20 text-gray-500 dark:text-gray-400 hover:bg-white dark:hover:bg-[#2C2C2E]";
        }
    });

    if (autoCenter) {
        const navContainer = document.getElementById('mobile-day-nav');
        const activeBtn = document.getElementById(`nav-btn-${activeIndex}`);
        if (navContainer && activeBtn) {
            // 计算让胶囊居中在屏幕正中央的 scrollLeft 偏移量
            const scrollLeft = activeBtn.offsetLeft - (navContainer.clientWidth / 2) + (activeBtn.clientWidth / 2);
            navContainer.scrollTo({ left: scrollLeft, behavior: 'smooth' });
        }
    }
}

// 弹窗逻辑
function showDetails(item) {
    const modal = document.getElementById('detail-modal');
    const container = document.getElementById('modal-container');
    
    document.getElementById('m-title').textContent = item.series_name;
    document.getElementById('m-episode-label').textContent = `S${String(item.season).padStart(2,'0')}E${String(item.episode).padStart(2,'0')}`;
    document.getElementById('m-poster').src = item.poster_path ? (imgBase + item.poster_path) : '';
    
    const formattedAirDate = item.air_date ? item.air_date.replace(/-/g, '.') : '未知时间';
    document.getElementById('m-date-val').textContent = formattedAirDate;
    document.getElementById('m-description').textContent = item.series_overview || item.overview || "暂无剧情简介，静待更新...";

    const badge = document.getElementById('m-status-badge');
    const actions = document.getElementById('m-actions');
    actions.innerHTML = '';
    
    const isReady = item.status === 'ready';
    badge.textContent = isReady ? "已入库" : item.status === 'upcoming' ? "待播出" : "待补货";
    badge.className = `px-2 py-1 rounded-md text-[10px] md:text-[11px] font-bold uppercase tracking-widest text-white shadow-sm ${isReady ? "bg-emerald-500" : item.status === 'upcoming' ? "bg-blue-500" : "bg-red-500"}`;

    if (isReady) {
        actions.innerHTML = `
            <button onclick="playItem('${item.series_id}')" class="w-full py-3 md:py-3.5 bg-brand-500 hover:bg-brand-600 text-white rounded-xl md:rounded-[14px] text-[13px] font-bold shadow-lg shadow-brand-500/30 active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-play"></i> 立即播放
            </button>`;
    } else {
        const copyTxt = `${item.series_name} S${String(item.season).padStart(2,'0')}E${String(item.episode).padStart(2,'0')}`;
        actions.innerHTML = `
            <button onclick="copyToClipboard('${copyTxt}')" class="w-full py-3 md:py-3.5 bg-gray-100 hover:bg-gray-200 dark:bg-[#2C2C2E] dark:hover:bg-[#3A3A3C] text-gray-800 dark:text-gray-200 rounded-xl md:rounded-[14px] text-[13px] font-bold active:scale-95 transition-all flex items-center justify-center gap-2 shadow-sm border border-gray-200/50 dark:border-white/5">
                <i class="fa-solid fa-copy"></i> 复制求片排期
            </button>`;
    }

    modal.classList.remove('hidden');
    container.offsetHeight; 
    modal.classList.remove('opacity-0');
    
    if(window.innerWidth < 640) container.classList.remove('translate-y-full');
    else container.classList.remove('scale-95');
}

function closeDetails() {
    const modal = document.getElementById('detail-modal');
    const container = document.getElementById('modal-container');
    
    modal.classList.add('opacity-0');
    if(window.innerWidth < 640) container.classList.add('translate-y-full');
    else container.classList.add('scale-95');
    
    setTimeout(() => modal.classList.add('hidden'), 300);
}

function playItem(id) { window.open(`${currentEmbyUrl}/web/index.html#!/item?id=${id}&serverId=${currentServerId}`, '_blank'); }

function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('#m-actions button'); const ogHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-check text-emerald-500"></i> <span class="text-emerald-500">已复制</span>';
        setTimeout(() => { btn.innerHTML = ogHtml; closeDetails(); }, 1000);
    });
}
</script>
{% endblock %}
