{% extends "layout.html" %}

{% block title %}去重管理 - EmbyPulse{% endblock %}

{% block content %}
<div class="p-4 md:p-8 max-w-7xl mx-auto flex flex-col gap-6 relative min-h-screen">
    
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
            <h1 class="text-2xl font-black tracking-tight text-gray-900 dark:text-white flex items-center gap-3">
                <i class="fa-solid fa-clone text-brand-500"></i> 洗版与去重中心
            </h1>
            <p class="text-[13px] text-gray-500 dark:text-gray-400 mt-1 font-medium">全局扫描媒体库，释放空间，保留最优画质与字幕。</p>
        </div>
        
        <div class="flex items-center gap-3 bg-white dark:bg-apple-cardDark p-2 rounded-2xl shadow-sm border border-gray-100 dark:border-white/5">
            <select id="scan-strategy" class="bg-gray-50 dark:bg-black/20 text-gray-800 dark:text-gray-200 text-[13px] font-bold px-3 py-2 rounded-xl outline-none border-none cursor-pointer">
                <option value="quality">🏆 策略：画质与音效至上</option>
                <option value="subs">🇨🇳 策略：中文字幕优先</option>
                <option value="size">💾 策略：空间体积最小化</option>
            </select>
            <button onclick="startScan()" id="btn-scan" class="bg-brand-500 hover:bg-brand-600 text-white px-5 py-2 rounded-xl text-[13px] font-bold shadow-md transition-all active:scale-95 flex items-center gap-2">
                <i class="fa-solid fa-radar"></i> 全库扫描
            </button>
        </div>
    </div>

    <div id="scan-progress-container" class="hidden bg-white dark:bg-apple-cardDark rounded-[24px] p-6 shadow-sm border border-brand-100 dark:border-brand-500/20 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gray-100 dark:bg-white/5">
            <div id="scan-progress-bar" class="h-full bg-brand-500 transition-all duration-300" style="width: 0%"></div>
        </div>
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-brand-50 dark:bg-brand-500/10 flex justify-center items-center shrink-0">
                <i class="fa-solid fa-compact-disc text-brand-500 text-xl animate-spin-slow"></i>
            </div>
            <div class="flex-1">
                <h3 class="font-bold text-[15px] text-gray-900 dark:text-white mb-1">系统正在执行漏斗式扫描...</h3>
                <p id="scan-status-text" class="text-[12px] text-gray-500 font-mono">正在初始化...</p>
            </div>
        </div>
    </div>

    <div id="result-summary" class="hidden flex items-center gap-3 px-4 py-3 bg-yellow-50 text-yellow-600 dark:bg-yellow-500/10 dark:text-yellow-500 rounded-xl text-[13px] font-bold border border-yellow-100 dark:border-yellow-500/20">
        <i class="fa-solid fa-circle-exclamation text-lg"></i>
        <span id="summary-text">发现 0 组重复媒体，已为您智能预选出劣质版本。</span>
    </div>

    <div id="dedupe-results" class="flex flex-col gap-4 pb-24">
        <div class="text-center py-20 text-gray-400">
            <i class="fa-solid fa-box-archive text-5xl mb-4 opacity-20"></i>
            <p class="text-[14px] font-medium">暂无数据，请点击上方按钮开始全库扫描</p>
        </div>
    </div>

    <div id="action-pill" class="fixed left-1/2 -translate-x-1/2 bottom-[90px] md:bottom-8 z-[100] bg-white/90 dark:bg-[#2C2C2E]/90 apple-blur border border-gray-200 dark:border-white/10 rounded-[24px] shadow-[0_20px_40px_rgba(0,0,0,0.2)] px-4 py-3 flex items-center gap-4 transition-all duration-400 transform translate-y-32 opacity-0 pointer-events-none">
        
        <div class="flex flex-col justify-center px-2">
            <div class="text-[11px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-0.5">即将清理</div>
            <div class="text-[15px] font-black text-gray-900 dark:text-white leading-none">
                已选 <span id="pill-count" class="text-red-500">0</span> 项
            </div>
        </div>
        
        <div class="h-8 w-[1px] bg-gray-200 dark:bg-white/10"></div>
        
        <div class="flex flex-col justify-center px-2">
            <div class="text-[11px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-0.5">释放空间</div>
            <div class="text-[15px] font-mono font-bold text-brand-500 leading-none" id="pill-size">0.0 GB</div>
        </div>

        <div class="flex items-center gap-2 ml-2">
            <button onclick="batchIgnore()" class="w-10 h-10 rounded-xl bg-gray-100 hover:bg-gray-200 dark:bg-black/30 dark:hover:bg-black/50 text-gray-600 dark:text-gray-300 flex justify-center items-center transition-colors tooltip" title="忽略选中组">
                <i class="fa-solid fa-eye-slash"></i>
            </button>
            <button onclick="batchDelete()" class="px-5 h-10 rounded-xl bg-red-500 hover:bg-red-600 text-white font-bold text-[14px] shadow-lg shadow-red-500/30 flex items-center gap-2 transition-all active:scale-95">
                <i class="fa-solid fa-trash-can"></i> 确认处决
            </button>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<style>
    .animate-spin-slow { animation: spin 3s linear infinite; }
    /* 自定义复选框样式 */
    .ep-checkbox {
        appearance: none; background-color: transparent; margin: 0; font: inherit; color: currentColor;
        width: 1.25em; height: 1.25em; border: 2px solid #9CA3AF; border-radius: 0.35em;
        display: grid; place-content: center; transition: all 0.2s ease-in-out; cursor: pointer;
    }
    .ep-checkbox::before {
        content: ""; width: 0.65em; height: 0.65em; transform: scale(0); transition: 120ms transform ease-in-out;
        box-shadow: inset 1em 1em white; transform-origin: center; clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
    }
    .ep-checkbox:checked { background-color: #EF4444; border-color: #EF4444; }
    .ep-checkbox:checked::before { transform: scale(1); }
    .ep-checkbox:disabled { opacity: 0.5; cursor: not-allowed; }
</style>

<script>
    let pollInterval = null;
    let selectedItems = new Map(); // Map<item_id, size_bytes>
    let allGroups = {};

    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024; const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // 动态控制悬浮胶囊
    function updateActionPill() {
        const pill = document.getElementById('action-pill');
        const countSpan = document.getElementById('pill-count');
        const sizeSpan = document.getElementById('pill-size');
        
        if (selectedItems.size > 0) {
            pill.classList.remove('translate-y-32', 'opacity-0', 'pointer-events-none');
            pill.classList.add('translate-y-0', 'opacity-100', 'pointer-events-auto');
            
            countSpan.innerText = selectedItems.size;
            let totalBytes = 0;
            selectedItems.forEach(size => totalBytes += size);
            sizeSpan.innerText = formatBytes(totalBytes);
        } else {
            pill.classList.add('translate-y-32', 'opacity-0', 'pointer-events-none');
            pill.classList.remove('translate-y-0', 'opacity-100', 'pointer-events-auto');
        }
    }

    // 行点击交互
    function toggleSelection(itemId, sizeBytes, event) {
        // 如果点击的是内部的特定元素（比如链接），不触发整行选中
        if(event && event.target.tagName.toLowerCase() === 'a') return;
        
        const checkbox = document.getElementById(`chk-${itemId}`);
        if(checkbox.disabled) return;
        
        // 同步 checkbox 状态
        if(event && event.target !== checkbox) checkbox.checked = !checkbox.checked;
        
        if (checkbox.checked) {
            selectedItems.set(itemId, sizeBytes);
            document.getElementById(`row-${itemId}`).classList.add('bg-red-50/50', 'dark:bg-red-500/10');
        } else {
            selectedItems.delete(itemId);
            document.getElementById(`row-${itemId}`).classList.remove('bg-red-50/50', 'dark:bg-red-500/10');
        }
        updateActionPill();
    }

    function toggleAccordion(groupKey) {
        const body = document.getElementById(`body-${groupKey}`);
        const icon = document.getElementById(`icon-${groupKey}`);
        if (body.classList.contains('hidden')) {
            body.classList.remove('hidden');
            icon.classList.add('rotate-180');
        } else {
            body.classList.add('hidden');
            icon.classList.remove('rotate-180');
        }
    }

    async function startScan() {
        const strategy = document.getElementById('scan-strategy').value;
        try {
            const res = await fetch('/api/dedupe/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({strategy: strategy})
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('scan-progress-container').classList.remove('hidden');
                document.getElementById('btn-scan').disabled = true;
                document.getElementById('btn-scan').classList.add('opacity-50');
                pollInterval = setInterval(checkStatus, 1500);
            } else {
                alert(data.msg);
            }
        } catch(e) { console.error(e); }
    }

    async function checkStatus() {
        try {
            const res = await fetch('/api/dedupe/status');
            const data = await res.json();
            if (data.success) {
                const state = data.data;
                document.getElementById('scan-progress-bar').style.width = `${state.progress}%`;
                document.getElementById('scan-status-text').innerText = state.message;
                
                if (!state.is_scanning) {
                    clearInterval(pollInterval);
                    document.getElementById('scan-progress-container').classList.add('hidden');
                    document.getElementById('btn-scan').disabled = false;
                    document.getElementById('btn-scan').classList.remove('opacity-50');
                    loadResults(); // 扫描完成，加载数据
                }
            }
        } catch(e) { console.error(e); }
    }

    async function loadResults() {
        try {
            const res = await fetch('/api/dedupe/results');
            const data = await res.json();
            if (data.success) {
                allGroups = data.data;
                renderResults(allGroups);
            }
        } catch(e) { console.error(e); }
    }

    function renderResults(groups) {
        const container = document.getElementById('dedupe-results');
        const summary = document.getElementById('result-summary');
        selectedItems.clear(); // 清空旧选择
        
        let keys = Object.keys(groups);
        if (keys.length === 0) {
            summary.classList.add('hidden');
            container.innerHTML = `<div class="text-center py-20 text-gray-400"><i class="fa-solid fa-box-archive text-5xl mb-4 opacity-20"></i><p class="text-[14px] font-medium">当前媒体库非常干净，没有发现重复项！</p></div>`;
            updateActionPill();
            return;
        }

        summary.classList.remove('hidden');
        document.getElementById('summary-text').innerText = `扫描完成：发现 ${keys.length} 组重复媒体。系统已智能为您勾选劣势版本。`;

        let html = '';
        keys.forEach(gKey => {
            const items = groups[gKey];
            const titleInfo = items[0].media_type === 'Movie' ? `🎬 ${items[0].title}` : `📺 ${items[0].title} - S${String(items[0].season_num).padStart(2,'0')}E${String(items[0].episode_num).padStart(2,'0')}`;
            
            html += `
            <div class="bg-white dark:bg-apple-cardDark rounded-[20px] shadow-sm border border-gray-100 dark:border-white/5 overflow-hidden transition-colors hover:border-brand-500/30">
                <div class="px-5 py-4 flex items-center justify-between cursor-pointer bg-gray-50/50 dark:bg-black/10 select-none" onclick="toggleAccordion('${gKey}')">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-brand-50 text-brand-500 dark:bg-brand-500/20 flex justify-center items-center font-black">${items.length}</div>
                        <h3 class="font-bold text-[15px] text-gray-900 dark:text-white">${titleInfo}</h3>
                    </div>
                    <i class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-300" id="icon-${gKey}"></i>
                </div>
                
                <div id="body-${gKey}" class="flex flex-col border-t border-gray-100 dark:border-white/5">
            `;

            items.forEach(item => {
                const sizeStr = formatBytes(item.size_bytes);
                let badgesHtml = '';
                
                // 画质徽章
                if (item.resolution === '4K') badgesHtml += `<span class="bg-purple-100 text-purple-600 dark:bg-purple-500/20 dark:text-purple-400 px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm whitespace-nowrap">4K</span> `;
                else if (item.resolution === '1080P') badgesHtml += `<span class="bg-blue-100 text-blue-600 dark:bg-blue-500/20 dark:text-blue-400 px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm whitespace-nowrap">1080P</span> `;
                else badgesHtml += `<span class="bg-gray-100 text-gray-600 dark:bg-white/10 dark:text-gray-300 px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm whitespace-nowrap">${item.resolution}</span> `;
                
                // 特效徽章
                if (item.has_dovi === 1) badgesHtml += `<span class="bg-yellow-100 text-yellow-600 dark:bg-yellow-500/20 dark:text-yellow-400 px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm whitespace-nowrap"><i class="fa-solid fa-wand-magic-sparkles mr-0.5"></i>DoVi</span> `;
                else if (item.has_hdr === 1) badgesHtml += `<span class="bg-orange-100 text-orange-600 dark:bg-orange-500/20 dark:text-orange-400 px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm whitespace-nowrap">HDR10</span> `;
                
                // 字幕徽章
                if (item.has_ass_sub === 1) badgesHtml += `<span class="bg-green-100 text-green-600 dark:bg-green-500/20 dark:text-green-400 px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm whitespace-nowrap"><i class="fa-solid fa-language mr-0.5"></i>中字 ASS</span> `;
                else if (item.has_chi_sub === 1) badgesHtml += `<span class="bg-emerald-100 text-emerald-600 dark:bg-emerald-500/20 dark:text-emerald-400 px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm whitespace-nowrap"><i class="fa-solid fa-language mr-0.5"></i>简中</span> `;
                else badgesHtml += `<span class="border border-gray-200 dark:border-white/10 text-gray-400 px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm whitespace-nowrap line-through">生肉无字</span> `;

                // 系统建议标记
                let tagHtml = '';
                let isChecked = false;
                let disabledAttr = '';
                let rowBg = '';

                if (item.is_exempt === 1) {
                    tagHtml = `<span class="text-[10px] font-bold text-indigo-500 bg-indigo-50 dark:bg-indigo-500/10 px-2 py-1 rounded border border-indigo-100 dark:border-indigo-500/20"><i class="fa-solid fa-shield-halved"></i> 多集/特供豁免</span>`;
                    disabledAttr = 'disabled';
                } else if (item.is_recommended_del === 1) {
                    tagHtml = `<span class="text-[10px] font-bold text-red-500 bg-red-50 dark:bg-red-500/10 px-2 py-1 rounded border border-red-100 dark:border-red-500/20"><i class="fa-solid fa-trash-can"></i> 建议清理</span>`;
                    isChecked = true;
                    rowBg = 'bg-red-50/50 dark:bg-red-500/10';
                    selectedItems.set(item.item_id, item.size_bytes); // 自动计入已选器
                } else if (item.score === items[0].score) {
                    // 最高分标记
                    tagHtml = `<span class="text-[10px] font-bold text-brand-500 bg-brand-50 dark:bg-brand-500/10 px-2 py-1 rounded border border-brand-100 dark:border-brand-500/20"><i class="fa-solid fa-trophy"></i> 最佳保留</span>`;
                } else {
                    tagHtml = `<span class="text-[10px] font-bold text-yellow-600 bg-yellow-50 dark:bg-yellow-500/10 px-2 py-1 rounded border border-yellow-200 dark:border-yellow-500/20"><i class="fa-solid fa-scale-balanced"></i> 悬而未决</span>`;
                }

                html += `
                <div id="row-${item.item_id}" class="flex flex-col md:flex-row p-4 md:items-center border-b border-gray-50/50 dark:border-white/5 cursor-pointer hover:bg-gray-50 dark:hover:bg-white/5 transition-colors gap-3 ${rowBg}" onclick="toggleSelection('${item.item_id}', ${item.size_bytes}, event)">
                    <div class="flex items-center gap-3 md:w-1/3 min-w-0">
                        <input type="checkbox" id="chk-${item.item_id}" class="ep-checkbox shrink-0" ${isChecked ? 'checked' : ''} ${disabledAttr} onclick="toggleSelection('${item.item_id}', ${item.size_bytes}, event)">
                        <div class="flex flex-col min-w-0">
                            <span class="text-[13px] font-bold text-gray-800 dark:text-gray-200 truncate" title="${item.file_name}">${item.file_name}</span>
                            <span class="text-[10px] font-mono text-gray-400 mt-1">${sizeStr} | ${item.v_codec} | ${item.a_codec}</span>
                        </div>
                    </div>
                    
                    <div class="flex flex-wrap gap-1.5 md:flex-1 md:justify-center pl-7 md:pl-0">
                        ${badgesHtml}
                    </div>
                    
                    <div class="flex justify-end items-center md:w-1/4 shrink-0 pr-2">
                        ${tagHtml}
                    </div>
                </div>`;
            });

            html += `</div></div>`;
        });
        
        container.innerHTML = html;
        updateActionPill(); // 渲染完毕后更新底栏
    }

    async function batchDelete() {
        if(selectedItems.size === 0) return;
        const totalSize = document.getElementById('pill-size').innerText;
        if(!confirm(`⚠️ 极度高危操作确认！\n\n您即将从物理硬盘上永久删除这 ${selectedItems.size} 个视频文件，释放 ${totalSize} 空间。\n此操作无法通过回收站撤销！\n\n确认删除吗？`)) return;
        
        document.getElementById('action-pill').style.opacity = '0.5';
        document.getElementById('action-pill').style.pointerEvents = 'none';
        
        try {
            const itemIds = Array.from(selectedItems.keys());
            const res = await fetch('/api/dedupe/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({item_ids: itemIds})
            });
            const data = await res.json();
            alert(data.msg);
            loadResults(); // 重新加载列表
        } catch(e) { console.error(e); alert("网络请求失败"); }
    }

    async function batchIgnore() {
        if(selectedItems.size === 0) return;
        if(!confirm(`要把包含这些文件的 ${selectedItems.size} 个组别加入永久白名单吗？\n以后全库扫描将永远跳过它们。`)) return;
        
        try {
            // 通过已选的 itemId 反推所在的 group_key
            const groupKeysToIgnore = new Set();
            selectedItems.forEach((_, itemId) => {
                for (let gKey in allGroups) {
                    if (allGroups[gKey].find(i => i.item_id === itemId)) {
                        groupKeysToIgnore.add(gKey);
                    }
                }
            });

            const res = await fetch('/api/dedupe/ignore', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({group_keys: Array.from(groupKeysToIgnore)})
            });
            const data = await res.json();
            alert(data.msg);
            loadResults();
        } catch(e) { console.error(e); }
    }

    // 页面加载完毕自动拉取上次结果
    document.addEventListener('DOMContentLoaded', () => {
        loadResults();
    });
</script>
{% endblock %}
