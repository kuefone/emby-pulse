name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: Docker image version prefix
        required: false
        default: "1.2.0"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/emby-stats
      VERSION: ${{ github.event.inputs.version || '1.2.0' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}.${{ github.run_number }}
          build-args: |
            APP_VERSION=${{ env.VERSION }}.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
